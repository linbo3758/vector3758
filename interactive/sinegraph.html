<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unit Circle to Sine Graph</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Times New Roman', serif;
        }
        .container {
            background: #ffffff;
            padding: 30px 35px 25px 35px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(5, 61, 130, 0.12);
            border: 1px solid rgba(5, 61, 130, 0.08);
        }
        canvas { display: block; margin: 0 auto; border-radius: 10px; background: #fafcff; }
        .info {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 18px;
            color: #053D82;
            font-family: 'Times New Roman', serif;
            font-size: 17px;
            font-weight: bold;
        }
        .info span { color: #4FCFE7; font-size: 19px; }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 16px;
        }
        .controls button {
            background: #053D82;
            color: #fff;
            border: none;
            padding: 8px 32px;
            border-radius: 30px;
            font-family: 'Times New Roman', serif;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .controls button:hover { background: #4FCFE7; color: #053D82; }
        .legend {
            display: flex;
            justify-content: center;
            gap: 35px;
            margin-top: 14px;
            font-family: 'Times New Roman', serif;
            font-size: 14px;
            color: #053D82;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(5,61,130,0.15); }
        .dot-red { background: #e74c5e; }
        .dot-yellow { background: #f1c40f; }
        .dot-blue { background: #4FCFE7; }
    </style>
</head>
<body>
<div class="container">
    <canvas id="canvas" width="880" height="380"></canvas>
    <div class="info">
        <span>θ</span> = <span id="angleDisplay">0°</span> &nbsp;&nbsp;|&nbsp;&nbsp;
        sin θ = <span id="sinDisplay">0.000</span> &nbsp;&nbsp;|&nbsp;&nbsp;
        Point: (<span id="xDisplay">1.000</span>, <span id="yDisplay">0.000</span>)
    </div>
    <div class="controls">
        <button id="playBtn">Play</button>
        <button id="resetBtn">Reset</button>
    </div>
    <div class="legend">
        <div class="legend-item"><span class="dot dot-red"></span> Point on circle</div>
        <div class="legend-item"><span class="dot dot-yellow"></span> Height (y)</div>
        <div class="legend-item"><span class="dot dot-blue"></span> Sine curve</div>
    </div>
</div>
<script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const angleDisplay = document.getElementById('angleDisplay');
        const sinDisplay = document.getElementById('sinDisplay');
        const xDisplay = document.getElementById('xDisplay');
        const yDisplay = document.getElementById('yDisplay');
        const playBtn = document.getElementById('playBtn');
        const resetBtn = document.getElementById('resetBtn');

        const cx = 190, cy = 190, R = 145;
        const graphStartX = 400, graphEndX = 860, graphBaseY = 190;
        const TWO_PI = 2 * Math.PI;

        let angle = 0;
        let isPlaying = false; 
        let animId = null;
        let history = [];

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ---- grid ----
            ctx.strokeStyle = 'rgba(5,61,130,0.05)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= 4; i++) {
                const x = cx - R + i * (R * 2 / 4);
                ctx.beginPath(); ctx.moveTo(x, cy - R); ctx.lineTo(x, cy + R); ctx.stroke();
                const y = cy - R + i * (R * 2 / 4);
                ctx.beginPath(); ctx.moveTo(cx - R, y); ctx.lineTo(cx + R, y); ctx.stroke();
            }

            // ---- axes ----
            ctx.strokeStyle = 'rgba(5,61,130,0.25)';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(cx - R - 15, cy); ctx.lineTo(cx + R + 15, cy); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, cy - R - 15); ctx.lineTo(cx, cy + R + 15); ctx.stroke();

            // ---- circle ----
            ctx.strokeStyle = 'rgba(5,61,130,0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(cx, cy, R, 0, TWO_PI); ctx.stroke();

            // ---- labels 1, -1 ----
            ctx.fillStyle = 'rgba(5,61,130,0.5)';
            ctx.font = '14px Times New Roman, serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'top';
            ctx.fillText('1', cx + R + 12, cy - 8);
            ctx.fillText('-1', cx - R - 28, cy - 8);
            ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
            ctx.fillText('1', cx - 10, cy - R - 12);
            ctx.fillText('-1', cx - 10, cy + R + 14);

            // ---- current point ----
            const x = Math.cos(angle);
            const y = Math.sin(angle);
            const px = cx + x * R;
            const py = cy - y * R;

            // radius line
            ctx.strokeStyle = 'rgba(231,76,94,0.35)';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([5,6]);
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(px, py); ctx.stroke();
            ctx.setLineDash([]);

            // height helper
            ctx.strokeStyle = 'rgba(241,196,15,0.6)';
            ctx.lineWidth = 2;
            ctx.setLineDash([4,6]);
            ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, cy); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#f1c40f';
            ctx.font = '15px Times New Roman, serif';
            ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
            const labelY = (py < cy) ? py - 10 : py + 22;
            ctx.fillText('y = ' + y.toFixed(2), px + 8, labelY);

            // red point
            ctx.shadowColor = 'rgba(231,76,94,0.3)';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#e74c5e';
            ctx.beginPath(); ctx.arc(px, py, 7, 0, TWO_PI); ctx.fill();
            ctx.shadowBlur = 0;

            // ---- angle arc ----
            ctx.strokeStyle = 'rgba(5,61,130,0.3)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(cx, cy, 30, -angle, 0);
            ctx.stroke();

            // ---- θ label 改动：让它直接绑定当前的旋转角，从而与红线速度完全同步 ----
            const thetaRadius = 50;  // 设为 50 像素（红线长度为145），让它优雅地靠在红线偏内侧的位置
            // 为了防止 θ 字母压在红线上，我们在角度上做了一个微调（-angle + 0.15），让它在红线上方一点点平行飞舞
            const tx = cx + Math.cos(-angle + 0.15) * thetaRadius;
            const ty = cy + Math.sin(-angle + 0.15) * thetaRadius;
            ctx.fillStyle = 'rgba(5,61,130,0.8)';
            ctx.font = 'italic 18px Times New Roman, serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('θ', tx, ty);

            // ---- sine graph ----
            const graphW = graphEndX - graphStartX;
            ctx.strokeStyle = 'rgba(5,61,130,0.25)';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(graphStartX - 10, graphBaseY); ctx.lineTo(graphEndX + 10, graphBaseY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(graphStartX, graphBaseY - R - 20); ctx.lineTo(graphStartX, graphBaseY + R + 20); ctx.stroke();

            ctx.fillStyle = 'rgba(5,61,130,0.5)';
            ctx.font = '13px Times New Roman, serif';
            ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
            ctx.fillText('1', graphStartX - 12, graphBaseY - R);
            ctx.fillText('-1', graphStartX - 12, graphBaseY + R);
            ctx.textAlign = 'center'; ctx.textBaseline = 'top';
            ctx.fillText('0°', graphStartX, graphBaseY + 10);
            ctx.fillText('90°', graphStartX + graphW * 0.25, graphBaseY + 10);
            ctx.fillText('180°', graphStartX + graphW * 0.5, graphBaseY + 10);
            ctx.fillText('270°', graphStartX + graphW * 0.25 * 3, graphBaseY + 10);
            ctx.fillText('360°', graphEndX, graphBaseY + 10);

            // draw history
            if (history.length > 1) {
                ctx.strokeStyle = '#4FCFE7';
                ctx.lineWidth = 2.5;
                ctx.shadowColor = 'rgba(79,207,231,0.2)';
                ctx.shadowBlur = 8;
                ctx.beginPath();
                for (let i = 0; i < history.length; i++) {
                    const h = history[i];
                    const gx = graphStartX + (h.angle / TWO_PI) * graphW;
                    const gy = graphBaseY - h.sinVal * R;
                    if (i === 0) ctx.moveTo(gx, gy);
                    else ctx.lineTo(gx, gy);
                }
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // current point on sine curve
            const curGX = graphStartX + (angle / TWO_PI) * graphW;
            const curGY = graphBaseY - y * R;
            ctx.shadowColor = 'rgba(79,207,231,0.3)';
            ctx.shadowBlur = 25;
            ctx.fillStyle = '#4FCFE7';
            ctx.beginPath(); ctx.arc(curGX, curGY, 7, 0, TWO_PI); ctx.fill();
            ctx.shadowBlur = 0;

            // connecting line
            ctx.strokeStyle = 'rgba(79,207,231,0.3)';
            ctx.lineWidth = 1;
            ctx.setLineDash([4,6]);
            ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(curGX, curGY); ctx.stroke();
            ctx.setLineDash([]);

            // update info
            const deg = ((angle * 180 / Math.PI) % 360).toFixed(0);
            angleDisplay.textContent = deg + '°';
            sinDisplay.textContent = y.toFixed(3);
            xDisplay.textContent = x.toFixed(3);
            yDisplay.textContent = y.toFixed(3);
        }

        function update() {
            if (!isPlaying) return;

            const speed = 0.015;
            angle += speed;

            if (angle >= TWO_PI) {
                angle = 0;
                history = [];
            }

            history.push({ angle: angle, sinVal: Math.sin(angle) });
            draw();

            animId = requestAnimationFrame(update);
        }

        function reset() {
            angle = 0;
            history = [];
            draw();
        }

        playBtn.addEventListener('click', function() {
            isPlaying = !isPlaying;
            playBtn.textContent = isPlaying ? 'Pause' : 'Play';
            if (isPlaying) update();
        });
        resetBtn.addEventListener('click', reset);
        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                playBtn.click();
            }
        });

        reset(); 
    })();
</script>
</body>
</html>
